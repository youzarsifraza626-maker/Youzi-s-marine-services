<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youzi's Marine Services | Karachi</title>
    <style>
        :root { --main-blue: #3785C4; --logo-green: #7AC142; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        header { background: #fff; padding: 30px; border-bottom: 5px solid var(--main-blue); }
        .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: var(--main-blue); color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; width: 95%; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1 style="color: var(--main-blue); margin: 0;">YOUZI'S MARINE SERVICES</h1>
        <p>Expert Maritime Solutions in Karachi</p>
    </header>
    <div class="container">
        <h2>Send Inquiry</h2>
        <form action="mailto:youzarsifraza626@gmail.com" method="post" enctype="text/plain">
            <input type="text" name="Name" placeholder="Your Name" required>
            <input type="text" name="Subject" placeholder="What do you need? (Radar, GPS, etc.)" required>
            <textarea name="Message" rows="5" placeholder="Details..."></textarea>
            <button type="submit" class="btn">SEND EMAIL</button>
        </form>
    </div>
    <footer>&copy; 2026 Youzi's Marine Services | Karachi, Pakistan</footer>
</body>
</html>
